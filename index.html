<!doctype html>
<html lang="en">
  <head>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legify-clone</title>

  <body>
